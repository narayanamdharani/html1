<!DOCTYPE html>
<html>
<head>
    <title>Login - Pacific Travel Agency</title>
    <style>
        *{
            margin:0; 
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }
        body{
            height:100vh;
            display:flex;
            justify-content:flex-start;
            align-items:center;
            background-image: url('pacific.png');
            background-repeat: no-repeat;
            background-size: cover;
            padding-left: 80px;
        }
        .login-box{
            background: rgba(255,255,255,0.95);
            width:350px;
            padding:40px;
            border-radius:10px;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
            text-align:center;
        }
        .login-box h2{ 
            margin-bottom:25px;
         }
        .login-box input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }
        .login-box input:focus{
             border-color:#ff5722;
     } 
        .login-box button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:black;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:15px;
        }
        .login-box button:hover{ background:#ff5722; }
        .login-box p{ margin-top:15px; font-size:14px; }
        .login-box a{ color:#ff5722; text-decoration:none; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Enter Email" required>
        <input type="password" id="loginPassword" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(e){
        e.preventDefault();

        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        // Get registered user from localStorage
        const registeredUser = JSON.parse(localStorage.getItem('user'));

        if(registeredUser && email === registeredUser.email && password === registeredUser.password){
            alert('Login successful!');
            localStorage.setItem('loggedIn', 'true'); // mark as logged in
            window.location.href = 'home.html'; // redirect to home
        } else {
            alert('Invalid email or password.');
        }
    });
</script>
</body>
</html>
